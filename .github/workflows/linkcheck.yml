name: linkcheck

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  pull_request:
    branches: [main]
    paths: ['**.md', '**.html']

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: '--verbose --no-progress **/*.md **/*.html'
          fail: false
